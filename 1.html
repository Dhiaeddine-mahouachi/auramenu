<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>قائمة المطعم</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900;1000&family=Tajawal:wght@400;700;800;900&display=swap');
:root{
  --bg:#f4f7fb;
  --ink:#101828;
  --muted:#667085;
  --glass:rgba(255,255,255,.72);
  --line:rgba(16,24,40,.09);
  --blue:#315efb;
  --pink:#ff4fa3;
  --lime:#9cff4f;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  direction:rtl;
  text-align:right;
  font-family:'Tajawal','Cairo',Arial,sans-serif;
  background:
    radial-gradient(circle at 15% 5%,rgba(49,94,251,.22),transparent 32%),
    radial-gradient(circle at 90% 10%,rgba(255,79,163,.18),transparent 30%),
    linear-gradient(180deg,#ffffff,var(--bg));
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}
img{width:100%;display:block}
.app{
  max-width:1180px;
  margin:auto;
  padding:18px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  padding:12px 0 20px;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:1000;
  font-size:22px;
}
.logo-dot{
  width:44px;
  height:44px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,var(--blue),var(--pink));
  color:white;
  box-shadow:0 18px 40px rgba(49,94,251,.25);
}
.order-link{
  color:white;
  background:#101828;
  text-decoration:none;
  padding:13px 18px;
  border-radius:999px;
  font-weight:900;
}
.hero{
  min-height:calc(100vh - 94px);
  display:grid;
  grid-template-columns:1fr 1.05fr;
  gap:20px;
  align-items:center;
}
.left h1{
  font-size:clamp(48px,8vw,100px);
  letter-spacing:-2px;
  line-height:.86;
}
.left p{
  margin:20px 0 26px;
  max-width:480px;
  color:var(--muted);
  line-height:1.7;
  font-size:18px;
}
.chips{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.chip{
  border:1px solid var(--line);
  background:var(--glass);
  backdrop-filter:blur(16px);
  border-radius:999px;
  padding:11px 15px;
  font-weight:900;
}
.orbit{
  position:relative;
  min-height:620px;
  border-radius:44px;
  background:linear-gradient(145deg,rgba(255,255,255,.72),rgba(255,255,255,.38));
  border:1px solid var(--line);
  overflow:hidden;
  box-shadow:0 34px 100px rgba(16,24,40,.08);
}
.orbit:before{
  content:"";
  position:absolute;
  inset:70px;
  border:2px dashed rgba(49,94,251,.17);
  border-radius:50%;
  animation:spin 24s linear infinite;
}
.orbit:after{
  content:"";
  position:absolute;
  inset:135px;
  border:1px solid rgba(255,79,163,.16);
  border-radius:50%;
  animation:spinReverse 18s linear infinite;
}
.planet{
  position:absolute;
  width:122px;
  height:122px;
  border-radius:32px;
  overflow:hidden;
  border:5px solid white;
  box-shadow:0 20px 50px rgba(16,24,40,.18);
  cursor:pointer;
  z-index:3;
  transition:.35s ease;
}
.planet img{
  height:100%;
  object-fit:cover;
}
.planet:hover,.planet.active{
  transform:scale(1.12) rotate(3deg);
}
.p1{left:50%;top:18px;transform:translateX(-50%)}
.p2{right:36px;top:150px}
.p3{right:70px;bottom:96px}
.p4{left:50%;bottom:20px;transform:translateX(-50%)}
.p5{left:70px;bottom:96px}
.p6{left:36px;top:150px}
.spotlight{
  position:absolute;
  left:50%;
  top:50%;
  z-index:4;
  width:300px;
  min-height:385px;
  transform:translate(-50%,-50%);
  border-radius:38px;
  padding:14px;
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:0 35px 100px rgba(16,24,40,.18);
}
.spot-img{
  height:210px;
  border-radius:30px;
  overflow:hidden;
  background:#ddd;
}
.spot-img img{
  height:100%;
  object-fit:cover;
}
.spot-body{padding:17px 10px 8px}
.label{
  font-size:13px;
  font-weight:1000;
  color:var(--blue);
  text-transform:none;
  letter-spacing:1px;
}
.spot-body h2{
  font-size:32px;
  letter-spacing:-1.3px;
  margin:6px 0;
}
.spot-body p{
  color:var(--muted);
  line-height:1.45;
  font-size:14px;
}
.spot-bottom{
  margin-top:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.price{
  font-size:28px;
  font-weight:1000;
}
.add{
  border:0;
  color:white;
  background:linear-gradient(135deg,var(--blue),var(--pink));
  padding:13px 16px;
  border-radius:18px;
  font-weight:1000;
}
.menu-list{
  padding:34px 0;
}
.list-head{
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:16px;
  margin-bottom:14px;
}
.list-head h2{
  font-size:44px;
  letter-spacing:-2px;
}
.select{
  border:1px solid var(--line);
  background:white;
  border-radius:16px;
  padding:13px 15px;
  font-weight:900;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}
.item{
  border:1px solid var(--line);
  background:white;
  border-radius:28px;
  padding:12px;
  box-shadow:0 16px 40px rgba(16,24,40,.05);
  transition:.28s ease;
  cursor:pointer;
}
.item:hover{
  transform:translateY(-6px);
}
.item-img{
  height:150px;
  border-radius:22px;
  overflow:hidden;
}
.item-img img{
  height:100%;
  object-fit:cover;
}
.item h3{
  margin:13px 4px 6px;
  font-size:20px;
  letter-spacing:-.5px;
}
.item p{
  margin:0 4px;
  min-height:40px;
  font-size:13px;
  color:var(--muted);
  line-height:1.35;
}
.item .price{
  margin:10px 4px 4px;
  font-size:24px;
}
.drawer{
  position:fixed;
  left:50%;
  bottom:16px;
  z-index:20;
  width:min(680px,calc(100% - 28px));
  transform:translate(-50%,130%);
  display:grid;
  grid-template-columns:86px 1fr auto;
  align-items:center;
  gap:12px;
  padding:10px;
  border-radius:28px;
  background:rgba(16,24,40,.9);
  backdrop-filter:blur(18px);
  color:white;
  transition:.38s cubic-bezier(.2,.9,.2,1);
  box-shadow:0 24px 80px rgba(16,24,40,.28);
}
.drawer.show{transform:translate(-50%,0)}
.drawer-img{
  width:86px;
  height:76px;
  border-radius:22px;
  overflow:hidden;
}
.drawer-img img{height:100%;object-fit:cover}
.drawer h3{font-size:18px}
.drawer p{color:#d0d5dd;font-size:13px;margin-top:3px}
.drawer a{
  background:white;
  color:#101828;
  text-decoration:none;
  padding:13px 16px;
  border-radius:18px;
  font-weight:1000;
}
.pulse{animation:pulse .45s ease both}
@keyframes pulse{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.8) rotate(-6deg)}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinReverse{to{transform:rotate(-360deg)}}

@media(max-width:900px){
  .hero{grid-template-columns:1fr}
  .orbit{min-height:560px}
  .grid{grid-template-columns:repeat(2,1fr)}
  .left h1{letter-spacing:-3px}
}
@media(max-width:560px){
  .app{padding:14px}
  .header{position:sticky;top:0;z-index:10;background:rgba(244,247,251,.7);backdrop-filter:blur(15px)}
  .logo{font-size:18px}
  .order-link{padding:11px 13px;font-size:13px}
  .hero{min-height:auto;padding-top:16px}
  .left h1{font-size:54px;letter-spacing:-2.5px}
  .left p{font-size:16px;margin:16px 0}
  .orbit{
    min-height:520px;
    border-radius:34px;
  }
  .orbit:before{inset:62px}
  .orbit:after{inset:126px}
  .planet{
    width:82px;
    height:82px;
    border-radius:24px;
    border-width:4px;
  }
  .p1{top:18px}
  .p2{right:14px;top:128px}
  .p3{right:24px;bottom:102px}
  .p4{bottom:18px}
  .p5{left:24px;bottom:102px}
  .p6{left:14px;top:128px}
  .spotlight{
    width:245px;
    min-height:335px;
    border-radius:32px;
  }
  .spot-img{height:165px;border-radius:25px}
  .spot-body h2{font-size:25px}
  .grid{grid-template-columns:1fr}
  .list-head h2{font-size:34px}
  .drawer{
    grid-template-columns:64px 1fr;
  }
  .drawer a{
    grid-column:1/-1;
    text-align:center;
  }
  .drawer-img{width:64px;height:60px;border-radius:18px}
}
</style>
</head>

  ]
};

let activeCat = "البرغر";
let activeItem = menu[activeCat][0];

const orbit = document.getElementById("orbit");
const grid = document.getElementById("grid");
const select = document.getElementById("select");

Object.keys(menu).forEach((cat,i)=>{
  const p = document.createElement("button");
  p.className = "planet p" + (i+1) + (cat===activeCat ? " active" : "");
  p.innerHTML = `<img src="${images[cat]}" alt="${cat}">`;
  p.onclick = () => setCategory(cat);
  orbit.appendChild(p);

  const opt = document.createElement("option");
  opt.value = cat;
  opt.textContent = cat;
  select.appendChild(opt);
});

select.onchange = () => setCategory(select.value);

function setCategory(cat){
  activeCat = cat;
  activeItem = menu[cat][0];
  select.value = cat;
  document.querySelectorAll(".planet").forEach((p,i)=>{
    p.classList.toggle("active", Object.keys(menu)[i] === cat);
  });
  renderSpotlight();
  renderGrid();
}

function renderSpotlight(){
  const spot = document.getElementById("spotlight");
  spot.classList.remove("pulse");
  void spot.offsetWidth;
  spot.classList.add("pulse");

  document.getElementById("spotImg").src = getProductImage(activeItem);
  document.getElementById("spotCat").textContent = activeCat;
  document.getElementById("spotName").textContent = activeItem[0];
  document.getElementById("spotDesc").textContent = activeItem[2];
  document.getElementById("spotPrice").textContent = activeItem[1];
  document.getElementById("spotAdd").onclick = () => openDrawer(activeItem);
}

function renderGrid(){
  document.getElementById("listTitle").textContent = "قائمة " + activeCat;
  grid.innerHTML = "";
  menu[activeCat].forEach(item=>{
    const card = document.createElement("article");
    card.className = "item";
    card.innerHTML = `
      <div class="item-img"><img src="${getProductImage(item)}" alt="${item[0]}"></div>
      <h3>${item[0]}</h3>
      <p>${item[2]}</p>
      <div class="price">${item[1]}</div>
    `;
    card.onclick = () => {
      activeItem = item;
      renderSpotlight();
      openDrawer(item);
      window.scrollTo({top:0,behavior:"smooth"});
    };
    grid.appendChild(card);
  });
}

function openDrawer(item){
  document.getElementById("drawerImg").src = getProductImage(item);
  document.getElementById("drawerName").textContent = item[0];
  document.getElementById("drawerPrice").textContent = item[1] + " • جاهز للطلب";
  document.getElementById("drawerOrder").href =
    "https://wa.me/905555555555?text=" + encodeURIComponent("مرحبا، أريد طلب: " + item[0] + " - " + item[1]);
  document.getElementById("drawer").classList.add("show");
}

setCategory(activeCat);
</script>
</body>
</html>
