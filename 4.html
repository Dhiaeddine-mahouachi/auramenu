<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900;1000&family=Tajawal:wght@400;700;800;900&display=swap');

:root{
  --bg:#fff8ef;
  --dark:#17100b;
  --muted:#7c6657;
  --orange:#ff6b00;
  --orange2:#ff9f1c;
  --cream:#fff3df;
  --line:rgba(0,0,0,.08);
}

*{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth}

body{
  direction:rtl;
  text-align:right;
  font-family:'Tajawal','Cairo',Arial,sans-serif;
  background:radial-gradient(circle at 10% 0%,#ffe0af 0,#fff8ef 34%,#fff 82%);
  color:var(--dark);
  overflow-x:hidden;
}

a{text-decoration:none;color:inherit}
button,input{font-family:inherit}

.nav{
  position:sticky;
  top:0;
  z-index:99;
  padding:12px 14px;
  background:rgba(255,248,239,.82);
  backdrop-filter:blur(18px);
  border-bottom:1px solid var(--line);
}

.nav-inner{
  max-width:1180px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}

.logo{
  font-size:20px;
  font-weight:1000;
  white-space:nowrap;
}

.logo span{color:var(--orange)}

.nav-links{
  display:flex;
  gap:8px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}

.nav-links::-webkit-scrollbar{display:none}

.nav-links a{
  flex:0 0 auto;
  background:#fff;
  border:1px solid var(--line);
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:900;
  box-shadow:0 8px 22px rgba(0,0,0,.04);
}

.hero{
  min-height:86vh;
  padding:48px 18px 30px;
  display:grid;
  place-items:center;
  text-align:center;
}

.badge{
  display:inline-flex;
  padding:9px 18px;
  border-radius:999px;
  color:#fff;
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  font-weight:1000;
  margin-bottom:18px;
  box-shadow:0 18px 40px rgba(255,107,0,.28);
}

h1{
  max-width:920px;
  margin:auto;
  font-size:clamp(42px,11vw,96px);
  line-height:.9;
  letter-spacing:-1.5px;
}

.hero p{
  max-width:620px;
  margin:18px auto 28px;
  color:var(--muted);
  font-size:18px;
  line-height:1.6;
}

.hero-actions{
  display:flex;
  gap:12px;
  justify-content:center;
  flex-wrap:wrap;
}

.btn{
  border:0;
  cursor:pointer;
  border-radius:999px;
  padding:15px 22px;
  font-weight:1000;
  color:white;
  background:var(--dark);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:48px;
}

.btn.orange{
  background:linear-gradient(135deg,var(--orange),var(--orange2));
}

.section{
  padding:58px 18px;
}

.wrap{
  max-width:1180px;
  margin:auto;
}

.section-head{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:18px;
  margin-bottom:22px;
}

.section-title{
  font-size:clamp(34px,8vw,62px);
  letter-spacing:-1px;
  line-height:.95;
}

.section-title span{color:var(--orange)}

.section-sub{
  color:var(--muted);
  max-width:430px;
  line-height:1.55;
}

.menu-block{
  display:grid;
  grid-template-columns:430px 1fr;
  gap:24px;
  align-items:center;
  background:rgba(255,255,255,.62);
  border:1px solid var(--line);
  border-radius:36px;
  padding:22px;
  box-shadow:0 30px 80px rgba(90,45,0,.08);
  overflow:hidden;
}

.stage{
  min-height:470px;
  display:flex;
  align-items:center;
  justify-content:center;
  perspective:1100px;
  border-radius:28px;
  background:
    radial-gradient(circle at 50% 28%,rgba(255,107,0,.34),transparent 30%),
    linear-gradient(145deg,#fff,#ffe6c8);
  position:relative;
  overflow:hidden;
}

.stage:after{
  content:"";
  position:absolute;
  inset:auto -40px -90px -40px;
  height:170px;
  background:radial-gradient(ellipse,rgba(0,0,0,.16),transparent 65%);
  filter:blur(10px);
}

.featured{
  width:min(330px,86vw);
  min-height:405px;
  position:relative;
  transform-style:preserve-3d;
  animation:float 4.4s ease-in-out infinite;
  will-change:transform;
  z-index:2;
}

.photo-frame{
  width:100%;
  height:255px;
  border-radius:34px;
  overflow:hidden;
  background:#fff;
  border:8px solid rgba(255,255,255,.82);
  box-shadow:0 30px 50px rgba(0,0,0,.18);
  transform:translateZ(75px) rotate(-1deg);
}

.photo-frame img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
  transform:scale(1.04);
  transition:transform .45s ease, opacity .25s ease;
}

.featured:hover .photo-frame img{transform:scale(1.08)}

.feature-info{
  position:absolute;
  left:8px;
  right:8px;
  bottom:0;
  padding:20px;
  border-radius:30px;
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(14px);
  border:1px solid rgba(0,0,0,.08);
  box-shadow:0 22px 40px rgba(0,0,0,.1);
  transform:translateZ(45px);
}

.feature-info h3{
  font-size:28px;
  line-height:1.05;
  letter-spacing:-.7px;
}

.feature-info p{
  color:var(--muted);
  margin:8px 0;
  line-height:1.45;
  font-size:14px;
}

.feature-price{
  font-size:28px;
  font-weight:1000;
  color:var(--orange);
}

.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

.product-btn{
  border:1px solid var(--line);
  background:#fff;
  border-radius:22px;
  padding:14px;
  text-align:right;
  cursor:pointer;
  transition:transform .22s ease, background .22s ease, color .22s ease, box-shadow .22s ease;
  box-shadow:0 14px 30px rgba(0,0,0,.04);
  min-height:76px;
}

.product-btn:hover,
.product-btn.active{
  background:var(--dark);
  color:#fff;
  transform:translateY(-3px) scale(1.01);
  box-shadow:0 18px 38px rgba(0,0,0,.14);
}

.product-btn strong{
  display:block;
  font-size:16px;
  margin-bottom:6px;
  line-height:1.15;
}

.product-btn span{
  font-size:18px;
  font-weight:1000;
  color:var(--orange);
}

.product-btn.active span,
.product-btn:hover span{
  color:#ffb45c;
}

.order-row{
  margin-top:16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.whatsapp{
  position:fixed;
  left:14px;
  bottom:14px;
  z-index:100;
  background:#24d366;
  color:white;
  padding:14px 17px;
  border-radius:999px;
  font-weight:1000;
  box-shadow:0 18px 40px rgba(36,211,102,.35);
}

.pop{animation:pop .44s cubic-bezier(.2,.9,.2,1)}

@keyframes float{
  0%,100%{transform:rotateY(-10deg) rotateX(5deg) translateY(0)}
  50%{transform:rotateY(10deg) rotateX(-4deg) translateY(-14px)}
}

@keyframes pop{
  from{opacity:.7;transform:scale(.92) rotateY(28deg)}
  to{opacity:1;transform:scale(1)}
}

@media(max-width:900px){
  .section-head{display:block}
  .section-sub{margin-top:10px}
  .menu-block{grid-template-columns:1fr}
  .stage{min-height:430px}
}

@media(max-width:560px){
  body{background:linear-gradient(180deg,#fff4e4,#fff)}

  .nav{padding:10px 12px}

  .nav-inner{
    align-items:flex-start;
    flex-direction:column;
    gap:10px;
  }

  .nav-links{
    width:100%;

  }

  .nav-links a{

    padding:9px 12px;
  }

  .hero{
    min-height:76vh;
    padding:38px 14px 20px;
  }

  h1{
    letter-spacing:-1px;
    font-size:clamp(40px,13vw,58px);
  }

  .hero p{
    font-size:15.5px;
    line-height:1.55;
    margin-top:14px;
  }

  .hero-actions .btn{
    width:100%;
    max-width:330px;
  }

  .section{
    padding:40px 12px;
  }

  .section-title{
    letter-spacing:-1.5px;
  }

  .menu-block{
    padding:12px;
    border-radius:28px;
    gap:14px;
  }

  .stage{
    min-height:375px;
    border-radius:22px;
  }

  .featured{
    width:min(286px,88vw);
    min-height:345px;
    animation:mobileFloat 4.2s ease-in-out infinite;
  }

  .photo-frame{
    height:205px;
    border-radius:28px;
    border-width:6px;
    box-shadow:0 20px 36px rgba(0,0,0,.18);
  }

  .feature-info{
    left:4px;
    right:4px;
    padding:15px;
    border-radius:24px;
  }

  .feature-info h3{font-size:22px}
  .feature-info p{font-size:13px;margin:6px 0}
  .feature-price{font-size:23px}

  .products{
    grid-template-columns:1fr 1fr;
    gap:9px;
  }

  .product-btn{
    border-radius:18px;
    padding:12px;
    min-height:72px;
  }

  .product-btn strong{font-size:13.5px}
  .product-btn span{font-size:15.5px}

  .order-row .btn{
    flex:1 1 100%;
  }

  .whatsapp{
    left:12px;
    bottom:12px;
    padding:13px 15px;
    font-size:13px;
  }
}

@media(max-width:370px){
  .products{grid-template-columns:1fr}
  .stage{min-height:365px}
  .featured{width:265px}

@keyframes mobileFloat{
  0%,100%{transform:rotateY(-6deg) rotateX(3deg) translateY(0)}
  50%{transform:rotateY(6deg) rotateX(-2deg) translateY(-10px)}
}

@media(prefers-reduced-motion:reduce){
  *{
    animation:none!important;
    transition:none!important;
    scroll-behavior:auto!important;
  }
}
</style>
</head>

const menu = document.getElementById("menu");

categories.forEach(cat => {
  const section = document.createElement("section");
  section.className = "section";
  section.id = cat.id;

  section.innerHTML = `
    <div class="wrap">
      <div class="section-head">
        <h2 class="section-title">${cat.icon} ${cat.title}<br><span>القائمة</span></h2>
        <p class="section-sub">${cat.sub}</p>
      </div>

      <div class="menu-block" data-category="${cat.id}">
        <div class="stage">
          <div class="featured">
            <div class="photo-frame">
              <img class="featured-img" src="${cat.products[0].img}" alt="${cat.products[0].name}" loading="lazy">
            </div>

            <div class="feature-info">
              <h3 class="featured-name">${cat.products[0].name}</h3>
              <p class="featured-desc">${cat.products[0].desc}</p>
              <div class="feature-price">${cat.products[0].price}</div>
            </div>
          </div>
        </div>

        <div>
          <div class="products">
            ${cat.products.map((p,i)=>`
              <button class="product-btn ${i===0?'active':''}" data-index="${i}">
                <strong>${p.name}</strong>
                <span>${p.price}</span>
              </button>
            `).join("")}
          </div>

          <div class="order-row">
            <a class="btn orange" href="https://wa.me/905555555555?text=${encodeURIComponent("مرحبا، أريد الطلب من قائمة " + cat.title)}">اطلب ${cat.title}</a>
            <a class="btn" href="#top">العودة للأعلى</a>
          </div>
        </div>
      </div>
    </div>
  `;

  menu.appendChild(section);
});

document.querySelectorAll(".menu-block").forEach(block => {
  const catId = block.dataset.category;
  const cat = categories.find(c => c.id === catId);

  const img = block.querySelector(".featured-img");
  const name = block.querySelector(".featured-name");
  const desc = block.querySelector(".featured-desc");
  const price = block.querySelector(".feature-price");
  const featured = block.querySelector(".featured");
  const buttons = block.querySelectorAll(".product-btn");

  buttons.forEach(btn => {
    btn.addEventListener("click", () => {
      const index = Number(btn.dataset.index);
      const product = cat.products[index];

      buttons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      featured.classList.remove("pop");
      void featured.offsetWidth;
      featured.classList.add("pop");

      img.style.opacity = "0";

      setTimeout(() => {
        img.src = product.img;
        img.alt = product.name;
        img.style.opacity = "1";
      }, 120);

      name.textContent = product.name;
      desc.textContent = product.desc;
      price.textContent = product.price;
    });
  });

  block.addEventListener("mousemove", e => {
    if(window.innerWidth < 900) return;

    const rect = block.getBoundingClientRect();
    const x = (e.clientX - rect.left - rect.width / 2) / 45;
    const y = (e.clientY - rect.top - rect.height / 2) / 45;

    featured.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
  });

  block.addEventListener("mouseleave", () => {
    featured.style.transform = "";
  });
});
</script>
