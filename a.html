<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Luxury Restaurant Menu</title>

<style>
:root{
  --paper:#fbf4e8;
  --ink:#20150f;
  --soft:#efe1cf;
  --muted:#7b6656;
  --accent:#b35b2c;
  --accent2:#e7a55b;
  --white:#fffaf2;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family: Georgia, "Times New Roman", serif;
  background:var(--paper);
  color:var(--ink);
  overflow-x:hidden;
}
button,input{font-family:inherit}
img{width:100%;display:block}

.page{max-width:1240px;margin:auto;padding:18px}
.header{
  min-height:94vh;
  border-radius:38px;
  background:
    linear-gradient(rgba(32,21,15,.42),rgba(32,21,15,.62)),
    url("https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1400&q=80");
  background-size:cover;
  background-position:center;
  color:white;
  padding:22px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  overflow:hidden;
  position:relative;
}
.header:after{
  content:"";
  position:absolute;
  inset:auto -80px -120px auto;
  width:320px;
  height:320px;
  border-radius:50%;
  background:rgba(231,165,91,.28);
  filter:blur(20px);
}
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  position:relative;
  z-index:2;
}
.logo{font-size:24px;font-weight:900;letter-spacing:-.5px}
.nav a{
  color:white;
  text-decoration:none;
  padding:11px 16px;
  border:1px solid rgba(255,255,255,.32);
  border-radius:999px;
  background:rgba(255,255,255,.12);
  backdrop-filter:blur(10px);
}
.hero-copy{
  position:relative;
  z-index:2;
  max-width:760px;
  padding-bottom:34px;
}
.kicker{
  display:inline-flex;
  padding:10px 16px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(12px);
  margin-bottom:18px;
}
h1{
  font-size:clamp(54px,13vw,136px);
  line-height:.82;
  letter-spacing:-6px;
}
.hero-copy p{
  margin-top:22px;
  max-width:520px;
  font-size:19px;
  line-height:1.55;
  color:#ffeeda;
}
.menu-shell{
  margin-top:22px;
  display:grid;
  grid-template-columns:290px 1fr;
  gap:20px;
}
.sidebar{
  position:sticky;
  top:14px;
  height:max-content;
  border-radius:34px;
  background:var(--white);
  padding:16px;
  border:1px solid rgba(32,21,15,.08);
  box-shadow:0 24px 60px rgba(82,48,23,.08);
}
.sidebar h2{
  font-size:35px;
  line-height:.9;
  margin:8px 6px 18px;
}
.cat-btn{
  width:100%;
  border:0;
  margin-bottom:10px;
  text-align:left;
  padding:16px;
  border-radius:22px;
  color:var(--ink);
  background:#f3e6d4;
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-weight:900;
  font-size:17px;
  cursor:pointer;
  transition:.3s ease;
}
.cat-btn.active{
  background:var(--ink);
  color:white;
  transform:translateX(8px);
}
.content{min-width:0}
.feature{
  min-height:430px;
  border-radius:40px;
  background:var(--white);
  display:grid;
  grid-template-columns:1fr 1fr;
  overflow:hidden;
  border:1px solid rgba(32,21,15,.08);
  box-shadow:0 24px 70px rgba(82,48,23,.1);
}
.feature-media{
  min-height:430px;
  overflow:hidden;
  clip-path:ellipse(90% 82% at 34% 50%);
  background:var(--soft);
}
.feature-media img{
  height:100%;
  object-fit:cover;
  transform:scale(1.04);
  animation:softZoom 7s ease-in-out infinite alternate;
}
.feature-text{
  padding:42px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.feature-label{
  color:var(--accent);
  font-weight:900;
  margin-bottom:12px;
}
.feature-text h2{
  font-size:clamp(42px,6vw,72px);
  line-height:.88;
  letter-spacing:-3px;
}
.feature-text p{
  margin:18px 0;
  color:var(--muted);
  line-height:1.6;
  font-size:17px;
}
.feature-price{
  font-size:42px;
  font-weight:900;
  color:var(--accent);
}
.order{
  width:max-content;
  margin-top:22px;
  border:0;
  background:var(--ink);
  color:white;
  padding:16px 24px;
  border-radius:999px;
  font-weight:900;
  cursor:pointer;
}
.products{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}
.card{
  border:0;
  background:var(--white);
  border-radius:30px;
  overflow:hidden;
  text-align:left;
  color:var(--ink);
  cursor:pointer;
  box-shadow:0 20px 50px rgba(82,48,23,.08);
  transition:.35s cubic-bezier(.2,.9,.2,1);
  border:1px solid rgba(32,21,15,.08);
}
.card:hover{transform:translateY(-8px) rotate(-1deg)}
.card.active{outline:3px solid var(--accent2)}
.card-img{
  height:170px;
  overflow:hidden;
  border-radius:30px 30px 44px 0;
}
.card-img img{
  height:100%;
  object-fit:cover;
  transition:.4s ease;
}
.card:hover img{transform:scale(1.08)}
.card-body{padding:16px}
.card-body h3{font-size:22px;line-height:1}
.card-body p{
  color:var(--muted);
  font-size:14px;
  line-height:1.35;
  margin:9px 0 13px;
  min-height:38px;
}
.card-price{
  font-size:24px;
  font-weight:900;
  color:var(--accent);
}
.mobile-tabs{display:none}
.fade-in{animation:fadeIn .5s ease both}
.float-word{
  position:fixed;
  right:-40px;
  top:42%;
  transform:rotate(90deg);
  font-size:13px;
  letter-spacing:6px;
  color:rgba(32,21,15,.24);
  font-weight:900;
}
.toast{
  position:fixed;
  left:50%;
  bottom:22px;
  z-index:80;
  transform:translate(-50%,120px);
  background:var(--ink);
  color:white;
  padding:15px 20px;
  border-radius:999px;
  font-weight:900;
  transition:.35s ease;
}
.toast.show{transform:translate(-50%,0)}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(22px) scale(.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes softZoom{
  from{transform:scale(1.04) translateX(0)}
  to{transform:scale(1.12) translateX(-12px)}
}
@media(max-width:900px){
  .page{padding:10px}
  .header{min-height:76vh;border-radius:30px}
  h1{letter-spacing:-3px}
  .menu-shell{display:block}
  .sidebar{display:none}
  .mobile-tabs{
    display:flex;
    gap:10px;
    overflow:auto;
    padding:14px 4px;
    position:sticky;
    top:0;
    z-index:20;
    background:linear-gradient(to bottom,var(--paper) 75%,transparent);
  }
  .mobile-tabs .cat-btn{
    width:auto;
    flex:0 0 auto;
    margin:0;
    padding:13px 16px;
    border-radius:999px;
    font-size:15px;
  }
  .mobile-tabs .cat-btn.active{transform:translateY(-2px)}
  .feature{grid-template-columns:1fr;border-radius:34px}
  .feature-media{
    min-height:310px;
    clip-path:none;
    border-radius:34px 34px 55px 0;
  }
  .feature-text{padding:24px}
  .products{grid-template-columns:1fr 1fr;gap:12px}
  .card{border-radius:24px}
  .card-img{height:135px;border-radius:24px 24px 34px 0}
  .card-body{padding:13px}
  .card-body h3{font-size:18px}
  .card-body p{font-size:12px}
  .float-word{display:none}
}
@media(max-width:430px){
  .header{min-height:70vh;padding:16px}
  .nav a{padding:10px 12px;font-size:13px}
  .hero-copy{padding-bottom:20px}
  .hero-copy p{font-size:16px}
  .feature-media{min-height:260px}
  .feature-price{font-size:34px}
  .products{grid-template-columns:1fr}
  .card{display:grid;grid-template-columns:125px 1fr}
  .card-img{
    height:100%;
    min-height:145px;
    border-radius:24px 40px 40px 24px;
  }
}
</style>
</head>
<body>

<div class="page">
  <header class="header">
    <nav class="nav">
      <div class="logo">Maison Menu</div>
      <a href="https://wa.me/905555555555">Reserve / Order</a>
    </nav>

    <div class="hero-copy">
      <div class="kicker">Luxury Digital Restaurant Menu</div>
      <h1>taste the menu</h1>
      <p>A completely different menu page with editorial design, smooth image morphing, elegant cards and mobile-first navigation.</p>
    </div>
  </header>

  <div class="mobile-tabs" id="mobileTabs"></div>

  <section class="menu-shell">
    <aside class="sidebar">
      <h2>Our<br>Menu</h2>
      <div id="desktopCats"></div>
    </aside>

    <main class="content">
      <section class="feature fade-in" id="feature">
        <div class="feature-media">
          <img id="featureImg" src="" alt="">
        </div>
        <div class="feature-text">
          <div class="feature-label" id="featureCat"></div>
          <h2 id="featureName"></h2>
          <p id="featureDesc"></p>
          <div class="feature-price" id="featurePrice"></div>
          <button class="order" id="orderBtn">Order this dish</button>
        </div>
      </section>

      <section class="products" id="products"></section>
    </main>
  </section>
</div>

<div class="float-word">SCROLL MENU</div>
<div class="toast" id="toast">Product selected</div>

<script>
const menu = {
  Burgers:[
    ["Classic Burger","₺220","Beef patty, lettuce, tomato and house sauce.","https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=900&q=80"],
    ["Cheese Burger","₺250","Beef patty, cheddar, pickles and creamy sauce.","https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=900&q=80"],
    ["Double Cheese","₺320","Double beef, double cheddar and caramelized onion.","https://images.unsplash.com/photo-1607013251379-e6eecfffe234?auto=format&fit=crop&w=900&q=80"],
    ["BBQ Burger","₺290","Beef patty, BBQ glaze and crispy onion.","https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&w=900&q=80"],
    ["Chicken Burger","₺260","Crispy chicken, lettuce and garlic mayo.","https://images.unsplash.com/photo-1606755962773-d324e0a13086?auto=format&fit=crop&w=900&q=80"],
    ["Mushroom Burger","₺280","Beef patty, mushroom cream and cheddar.","https://images.unsplash.com/photo-1550317138-10000687a72b?auto=format&fit=crop&w=900&q=80"]
  ],
  Pizza:[
    ["Margherita","₺260","Mozzarella, tomato sauce and fresh basil.","https://images.unsplash.com/photo-1574071318508-1cdbab80d002?auto=format&fit=crop&w=900&q=80"],
    ["Pepperoni","₺320","Pepperoni, mozzarella and rich tomato sauce.","https://images.unsplash.com/photo-1628840042765-356cda07504e?auto=format&fit=crop&w=900&q=80"],
    ["Four Cheese","₺340","Four cheese blend with a golden crust.","https://images.unsplash.com/photo-1594007654729-407eedc4be65?auto=format&fit=crop&w=900&q=80"],
    ["BBQ Chicken","₺350","Chicken, BBQ sauce and mozzarella.","https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=900&q=80"],
    ["Meat Lovers","₺390","Beef, sausage, pepperoni and mozzarella.","https://images.unsplash.com/photo-1593560708920-61dd98c46a4e?auto=format&fit=crop&w=900&q=80"],
    ["Vegetarian","₺290","Mushroom, pepper, olive and corn.","https://images.unsplash.com/photo-1601924582970-9238bcb495d9?auto=format&fit=crop&w=900&q=80"]
  ],
  Grill:[
    ["Ribeye Steak","₺780","Grilled ribeye with butter and herbs.","https://images.unsplash.com/photo-1558030006-450675393462?auto=format&fit=crop&w=900&q=80"],
    ["T-Bone Steak","₺890","Large T-bone steak with grilled vegetables.","https://images.unsplash.com/photo-1600891964092-4316c288032e?auto=format&fit=crop&w=900&q=80"],
    ["Lamb Chops","₺720","Lamb chops served with rice and pepper.","https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=900&q=80"],
    ["Mixed Grill","₺850","Kebab, lamb, chicken and meatballs.","https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?auto=format&fit=crop&w=900&q=80"],
    ["Beef Kebab","₺450","Grilled beef kebab with lavash and salad.","https://images.unsplash.com/photo-1603360946369-dc9bb6258143?auto=format&fit=crop&w=900&q=80"],
    ["Meatballs","₺380","Turkish köfte with fries and salad.","https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?auto=format&fit=crop&w=900&q=80"]
  ],
  Chicken:[
    ["Grilled Chicken","₺320","Grilled chicken breast with rice and salad.","https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?auto=format&fit=crop&w=900&q=80"],
    ["Crispy Chicken","₺340","Crispy strips, fries and special sauce.","https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?auto=format&fit=crop&w=900&q=80"],
    ["Chicken Wings","₺310","Spicy wings with fries and ranch sauce.","https://images.unsplash.com/photo-1608039829572-78524f79c4c7?auto=format&fit=crop&w=900&q=80"],
    ["Chicken Schnitzel","₺350","Schnitzel with fries and lemon.","https://images.unsplash.com/photo-1632778149955-e80f8ceca2e8?auto=format&fit=crop&w=900&q=80"],
    ["Chicken Wrap","₺280","Chicken, tortilla, sauce and lettuce.","https://images.unsplash.com/photo-1626700051175-6818013e1d4f?auto=format&fit=crop&w=900&q=80"],
    ["Chicken Kebab","₺360","Chicken skewers with rice and salad.","https://images.unsplash.com/photo-1633321702518-7feccafb94d5?auto=format&fit=crop&w=900&q=80"]
  ],
  Sides:[
    ["French Fries","₺120","Golden crispy fries.","https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=900&q=80"],
    ["Curly Fries","₺140","Seasoned curly fries.","https://images.unsplash.com/photo-1585109649139-366815a0d713?auto=format&fit=crop&w=900&q=80"],
    ["Potato Wedges","₺150","Spicy potato wedges.","https://images.unsplash.com/photo-1598679253544-2c97992403ea?auto=format&fit=crop&w=900&q=80"],
    ["Garlic Bread","₺130","Toasted bread with garlic butter.","https://images.unsplash.com/photo-1573140247632-f8fd74997d5c?auto=format&fit=crop&w=900&q=80"],
    ["Rice","₺90","Soft butter rice.","https://images.unsplash.com/photo-1516684732162-798a0062be99?auto=format&fit=crop&w=900&q=80"],
    ["Coleslaw","₺80","Cabbage, carrot and creamy sauce.","https://images.unsplash.com/photo-1505253716362-afaea1d3d1af?auto=format&fit=crop&w=900&q=80"]
  ],
  Drinks:[
    ["Coca-Cola","₺70","Cold 330ml drink.","https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&w=900&q=80"],
    ["Sprite","₺70","Cold 330ml drink.","https://images.unsplash.com/photo-1624517452488-04869289c4ca?auto=format&fit=crop&w=900&q=80"],
    ["Fanta","₺70","Cold 330ml drink.","https://images.unsplash.com/photo-1625772299848-391b6a87d7b3?auto=format&fit=crop&w=900&q=80"],
    ["Ice Tea","₺80","Peach or lemon ice tea.","https://images.unsplash.com/photo-1556679343-c7306c1976bc?auto=format&fit=crop&w=900&q=80"],
    ["Orange Juice","₺120","Fresh squeezed orange juice.","https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?auto=format&fit=crop&w=900&q=80"],
    ["Mineral Water","₺40","Cold mineral water.","https://images.unsplash.com/photo-1616118132534-381148898bb4?auto=format&fit=crop&w=900&q=80"]
  ],
  Desserts:[
    ["Cheesecake","₺180","Cheesecake slice with fruit sauce.","https://images.unsplash.com/photo-1533134242443-d4fd215305ad?auto=format&fit=crop&w=900&q=80"],
    ["Chocolate Cake","₺170","Rich chocolate cake slice.","https://images.unsplash.com/photo-1606890737304-57a1ca8a5b62?auto=format&fit=crop&w=900&q=80"],
    ["Brownie","₺160","Warm brownie with chocolate sauce.","https://images.unsplash.com/photo-1606313564200-e75d5e30476c?auto=format&fit=crop&w=900&q=80"],
    ["Tiramisu","₺190","Classic coffee cream dessert.","https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?auto=format&fit=crop&w=900&q=80"],
    ["Ice Cream","₺130","Vanilla, chocolate or strawberry.","https://images.unsplash.com/photo-1563805042-7684c019e1cb?auto=format&fit=crop&w=900&q=80"],
    ["Kunafa","₺220","Hot kunafa with pistachio.","https://images.unsplash.com/photo-1579372786545-d24232daf58c?auto=format&fit=crop&w=900&q=80"]
  ]
};

let activeCat = "Burgers";
let activeIndex = 0;

const desktopCats = document.getElementById("desktopCats");
const mobileTabs = document.getElementById("mobileTabs");
const products = document.getElementById("products");

function makeCatButtons(target){
  Object.keys(menu).forEach(cat=>{
    const btn = document.createElement("button");
    btn.className = "cat-btn" + (cat === activeCat ? " active" : "");
    btn.innerHTML = `<span>${cat}</span><strong>${menu[cat].length}</strong>`;
    btn.onclick = () => {
      activeCat = cat;
      activeIndex = 0;
      updateCats();
      renderAll();
    };
    target.appendChild(btn);
  });
}

function updateCats(){
  document.querySelectorAll(".cat-btn").forEach(btn=>{
    const text = btn.querySelector("span").textContent;
    btn.classList.toggle("active", text === activeCat);
  });
}

function renderFeature(){
  const item = menu[activeCat][activeIndex];
  const feature = document.getElementById("feature");
  feature.classList.remove("fade-in");
  void feature.offsetWidth;
  feature.classList.add("fade-in");

  document.getElementById("featureImg").src = item[3];
  document.getElementById("featureImg").alt = item[0];
  document.getElementById("featureCat").textContent = activeCat + " selection";
  document.getElementById("featureName").textContent = item[0];
  document.getElementById("featureDesc").textContent = item[2];
  document.getElementById("featurePrice").textContent = item[1];

  document.getElementById("orderBtn").onclick = () => {
    window.location.href = `https://wa.me/905555555555?text=Hello, I want to order ${encodeURIComponent(item[0] + " " + item[1])}`;
  };
}

function renderProducts(){
  products.innerHTML = "";
  menu[activeCat].forEach((item,i)=>{
    const card = document.createElement("button");
    card.className = "card fade-in" + (i === activeIndex ? " active" : "");
    card.style.animationDelay = `${i*55}ms`;
    card.innerHTML = `
      <div class="card-img">
        <img src="${item[3]}" alt="${item[0]}" loading="lazy">
      </div>
      <div class="card-body">
        <h3>${item[0]}</h3>
        <p>${item[2]}</p>
        <div class="card-price">${item[1]}</div>
      </div>
    `;
    card.onclick = () => {
      activeIndex = i;
      renderFeature();
      renderProducts();
      showToast(item[0] + " selected");
      if(window.innerWidth < 700){
        document.getElementById("feature").scrollIntoView({behavior:"smooth", block:"start"});
      }
    };
    products.appendChild(card);
  });
}

function renderAll(){
  renderFeature();
  renderProducts();
}

function showToast(text){
  const toast = document.getElementById("toast");
  toast.textContent = text;
  toast.classList.add("show");
  setTimeout(()=>toast.classList.remove("show"),1200);
}

makeCatButtons(desktopCats);
makeCatButtons(mobileTabs);
renderAll();
</script>

</body>
</html>
