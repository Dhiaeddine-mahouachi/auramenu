<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Food Orbit Menu</title>

<style>
:root{
  --bg:#f4f7fb;
  --ink:#101828;
  --muted:#667085;
  --glass:rgba(255,255,255,.72);
  --line:rgba(16,24,40,.09);
  --blue:#315efb;
  --pink:#ff4fa3;
  --lime:#9cff4f;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at 15% 5%,rgba(49,94,251,.22),transparent 32%),
    radial-gradient(circle at 90% 10%,rgba(255,79,163,.18),transparent 30%),
    linear-gradient(180deg,#ffffff,var(--bg));
  color:var(--ink);
  min-height:100vh;
  overflow-x:hidden;
}
img{width:100%;display:block}
.app{
  max-width:1180px;
  margin:auto;
  padding:18px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  padding:12px 0 20px;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:1000;
  font-size:22px;
}
.logo-dot{
  width:44px;
  height:44px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,var(--blue),var(--pink));
  color:white;
  box-shadow:0 18px 40px rgba(49,94,251,.25);
}
.order-link{
  color:white;
  background:#101828;
  text-decoration:none;
  padding:13px 18px;
  border-radius:999px;
  font-weight:900;
}
.hero{
  min-height:calc(100vh - 94px);
  display:grid;
  grid-template-columns:1fr 1.05fr;
  gap:20px;
  align-items:center;
}
.left h1{
  font-size:clamp(48px,8vw,100px);
  letter-spacing:-5px;
  line-height:.86;
}
.left p{
  margin:20px 0 26px;
  max-width:480px;
  color:var(--muted);
  line-height:1.7;
  font-size:18px;
}
.chips{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.chip{
  border:1px solid var(--line);
  background:var(--glass);
  backdrop-filter:blur(16px);
  border-radius:999px;
  padding:11px 15px;
  font-weight:900;
}
.orbit{
  position:relative;
  min-height:620px;
  border-radius:44px;
  background:linear-gradient(145deg,rgba(255,255,255,.72),rgba(255,255,255,.38));
  border:1px solid var(--line);
  overflow:hidden;
  box-shadow:0 34px 100px rgba(16,24,40,.08);
}
.orbit:before{
  content:"";
  position:absolute;
  inset:70px;
  border:2px dashed rgba(49,94,251,.17);
  border-radius:50%;
  animation:spin 24s linear infinite;
}
.orbit:after{
  content:"";
  position:absolute;
  inset:135px;
  border:1px solid rgba(255,79,163,.16);
  border-radius:50%;
  animation:spinReverse 18s linear infinite;
}
.planet{
  position:absolute;
  width:122px;
  height:122px;
  border-radius:32px;
  overflow:hidden;
  border:5px solid white;
  box-shadow:0 20px 50px rgba(16,24,40,.18);
  cursor:pointer;
  z-index:3;
  transition:.35s ease;
  background:white;
}
.planet img{
  height:100%;
  object-fit:cover;
}
.planet:hover,.planet.active{
  transform:scale(1.12) rotate(3deg);
}
.p1{left:50%;top:18px;transform:translateX(-50%)}
.p2{right:36px;top:150px}
.p3{right:70px;bottom:96px}
.p4{left:50%;bottom:20px;transform:translateX(-50%)}
.p5{left:70px;bottom:96px}
.p6{left:36px;top:150px}
.spotlight{
  position:absolute;
  left:50%;
  top:50%;
  z-index:4;
  width:300px;
  min-height:385px;
  transform:translate(-50%,-50%);
  border-radius:38px;
  padding:14px;
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:0 35px 100px rgba(16,24,40,.18);
}
.spot-img{
  height:210px;
  border-radius:30px;
  overflow:hidden;
  background:#ddd;
}
.spot-img img{
  height:100%;
  object-fit:cover;
}
.spot-body{padding:17px 10px 8px}
.label{
  font-size:13px;
  font-weight:1000;
  color:var(--blue);
  text-transform:uppercase;
  letter-spacing:1px;
}
.spot-body h2{
  font-size:32px;
  letter-spacing:-1.3px;
  margin:6px 0;
}
.spot-body p{
  color:var(--muted);
  line-height:1.45;
  font-size:14px;
}
.spot-bottom{
  margin-top:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.price{
  font-size:28px;
  font-weight:1000;
}
.add{
  border:0;
  color:white;
  background:linear-gradient(135deg,var(--blue),var(--pink));
  padding:13px 16px;
  border-radius:18px;
  font-weight:1000;
  cursor:pointer;
}
.menu-list{
  padding:34px 0;
}
.list-head{
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:16px;
  margin-bottom:14px;
}
.list-head h2{
  font-size:44px;
  letter-spacing:-2px;
}
.select{
  border:1px solid var(--line);
  background:white;
  border-radius:16px;
  padding:13px 15px;
  font-weight:900;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}
.item{
  border:1px solid var(--line);
  background:white;
  border-radius:28px;
  padding:12px;
  box-shadow:0 16px 40px rgba(16,24,40,.05);
  transition:.28s ease;
  cursor:pointer;
}
.item:hover{
  transform:translateY(-6px);
}
.item-img{
  height:150px;
  border-radius:22px;
  overflow:hidden;
  background:#eef2f7;
}
.item-img img{
  height:100%;
  object-fit:cover;
}
.item h3{
  margin:13px 4px 6px;
  font-size:20px;
  letter-spacing:-.5px;
}
.item p{
  margin:0 4px;
  min-height:40px;
  font-size:13px;
  color:var(--muted);
  line-height:1.35;
}
.item .price{
  margin:10px 4px 4px;
  font-size:24px;
}
.drawer{
  position:fixed;
  left:50%;
  bottom:16px;
  z-index:20;
  width:min(680px,calc(100% - 28px));
  transform:translate(-50%,130%);
  display:grid;
  grid-template-columns:86px 1fr auto;
  align-items:center;
  gap:12px;
  padding:10px;
  border-radius:28px;
  background:rgba(16,24,40,.9);
  backdrop-filter:blur(18px);
  color:white;
  transition:.38s cubic-bezier(.2,.9,.2,1);
  box-shadow:0 24px 80px rgba(16,24,40,.28);
}
.drawer.show{transform:translate(-50%,0)}
.drawer-img{
  width:86px;
  height:76px;
  border-radius:22px;
  overflow:hidden;
}
.drawer-img img{height:100%;object-fit:cover}
.drawer h3{font-size:18px}
.drawer p{color:#d0d5dd;font-size:13px;margin-top:3px}
.drawer a{
  background:white;
  color:#101828;
  text-decoration:none;
  padding:13px 16px;
  border-radius:18px;
  font-weight:1000;
}
.pulse{animation:pulse .45s ease both}
@keyframes pulse{
  0%{opacity:0;transform:translate(-50%,-50%) scale(.8) rotate(-6deg)}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinReverse{to{transform:rotate(-360deg)}}

@media(max-width:900px){
  .hero{grid-template-columns:1fr}
  .orbit{min-height:560px}
  .grid{grid-template-columns:repeat(2,1fr)}
  .left h1{letter-spacing:-3px}
}
@media(max-width:560px){
  .app{padding:14px}
  .header{position:sticky;top:0;z-index:10;background:rgba(244,247,251,.7);backdrop-filter:blur(15px)}
  .logo{font-size:18px}
  .order-link{padding:11px 13px;font-size:13px}
  .hero{min-height:auto;padding-top:16px}
  .left h1{font-size:54px;letter-spacing:-2.5px}
  .left p{font-size:16px;margin:16px 0}
  .orbit{
    min-height:520px;
    border-radius:34px;
  }
  .orbit:before{inset:62px}
  .orbit:after{inset:126px}
  .planet{
    width:82px;
    height:82px;
    border-radius:24px;
    border-width:4px;
  }
  .p1{top:18px}
  .p2{right:14px;top:128px}
  .p3{right:24px;bottom:102px}
  .p4{bottom:18px}
  .p5{left:24px;bottom:102px}
  .p6{left:14px;top:128px}
  .spotlight{
    width:245px;
    min-height:335px;
    border-radius:32px;
  }
  .spot-img{height:165px;border-radius:25px}
  .spot-body h2{font-size:25px}
  .grid{grid-template-columns:1fr}
  .list-head h2{font-size:34px}
  .drawer{
    grid-template-columns:64px 1fr;
  }
  .drawer a{
    grid-column:1/-1;
    text-align:center;
  }
  .drawer-img{width:64px;height:60px;border-radius:18px}
}
</style>
</head>

<body>
<div class="app">
  <header class="header">
    <div class="logo"><div class="logo-dot">◉</div> Food Orbit</div>
    <a class="order-link" href="https://wa.me/905555555555">WhatsApp</a>
  </header>

  <section class="hero">
    <div class="left">
      <h1>Orbit your favorite dish.</h1>
      <p>Tap a food planet. The menu changes with a new orbit animation, spotlight card and quick order drawer.</p>
      <div class="chips">
        <span class="chip">Fast mobile</span>
        <span class="chip">Animated menu</span>
        <span class="chip">WhatsApp order</span>
      </div>
    </div>

    <div class="orbit" id="orbit">
      <div class="spotlight" id="spotlight">
        <div class="spot-img"><img id="spotImg" src="" alt=""></div>
        <div class="spot-body">
          <div class="label" id="spotCat"></div>
          <h2 id="spotName"></h2>
          <p id="spotDesc"></p>
          <div class="spot-bottom">
            <div class="price" id="spotPrice"></div>
            <button class="add" id="spotAdd">Select</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="menu-list">
    <div class="list-head">
      <h2 id="listTitle">Menu</h2>
      <select class="select" id="select"></select>
    </div>
    <div class="grid" id="grid"></div>
  </section>
</div>

<div class="drawer" id="drawer">
  <div class="drawer-img"><img id="drawerImg" src="" alt=""></div>
  <div>
    <h3 id="drawerName"></h3>
    <p id="drawerPrice"></p>
  </div>
  <a id="drawerOrder" href="#">Order</a>
</div>

<script>
const categoryImages = {
  Burgers:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=900&q=80",
  Pizza:"https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?auto=format&fit=crop&w=900&q=80",
  Grill:"https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=900&q=80",
  Chicken:"https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?auto=format&fit=crop&w=900&q=80",
  Sides:"https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=900&q=80",
  Drinks:"https://images.unsplash.com/photo-1544145945-f90425340c7e?auto=format&fit=crop&w=900&q=80"
};

const menu = {
  Burgers:[
    {name:"Classic Burger",price:"₺220",desc:"Beef patty, lettuce, tomato, sauce",img:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=900&q=80"},
    {name:"Cheese Burger",price:"₺250",desc:"Cheddar, pickles, beef patty, sauce",img:"https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=900&q=80"},
    {name:"Double Cheese",price:"₺320",desc:"Double beef, double cheddar, onion",img:"https://images.unsplash.com/photo-1553979459-d2229ba7433b?auto=format&fit=crop&w=900&q=80"},
    {name:"BBQ Burger",price:"₺290",desc:"BBQ sauce, crispy onion, beef",img:"https://images.unsplash.com/photo-1571091718767-18b5b1457add?auto=format&fit=crop&w=900&q=80"},
    {name:"Mushroom Burger",price:"₺280",desc:"Mushroom sauce, cheddar, beef",img:"https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?auto=format&fit=crop&w=900&q=80"},
    {name:"Chicken Burger",price:"₺260",desc:"Crispy chicken, mayo, lettuce",img:"https://images.unsplash.com/photo-1606755962773-d324e0a13086?auto=format&fit=crop&w=900&q=80"}
  ],
  Pizza:[
    {name:"Margherita",price:"₺260",desc:"Mozzarella, tomato, basil",img:"https://images.unsplash.com/photo-1574071318508-1cdbab80d002?auto=format&fit=crop&w=900&q=80"},
    {name:"Pepperoni",price:"₺320",desc:"Pepperoni, mozzarella, tomato sauce",img:"https://images.unsplash.com/photo-1628840042765-356cda07504e?auto=format&fit=crop&w=900&q=80"},
    {name:"Four Cheese",price:"₺340",desc:"Four cheese blend",img:"https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&w=900&q=80"},
    {name:"BBQ Chicken",price:"₺350",desc:"Chicken, BBQ sauce, mozzarella",img:"https://images.unsplash.com/photo-1565299507177-b0ac66763828?auto=format&fit=crop&w=900&q=80"},
    {name:"Meat Lovers",price:"₺390",desc:"Beef, sausage, pepperoni",img:"https://images.unsplash.com/photo-1594007654729-407eedc4be65?auto=format&fit=crop&w=900&q=80"},
    {name:"Vegetarian",price:"₺290",desc:"Mushroom, pepper, olive, corn",img:"https://images.unsplash.com/photo-1571066811602-716837d681de?auto=format&fit=crop&w=900&q=80"}
  ],
  Grill:[
    {name:"Ribeye Steak",price:"₺780",desc:"Grilled ribeye, butter, herbs",img:"https://images.unsplash.com/photo-1546833999-b9f581a1996d?auto=format&fit=crop&w=900&q=80"},
    {name:"T-Bone Steak",price:"₺890",desc:"T-bone steak, grilled vegetables",img:"https://images.unsplash.com/photo-1600891964092-4316c288032e?auto=format&fit=crop&w=900&q=80"},
    {name:"Lamb Chops",price:"₺720",desc:"Lamb chops, rice, pepper",img:"https://images.unsplash.com/photo-1603360946369-dc9bb6258143?auto=format&fit=crop&w=900&q=80"},
    {name:"Mixed Grill",price:"₺850",desc:"Kebab, lamb, chicken, meatballs",img:"https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?auto=format&fit=crop&w=900&q=80"},
    {name:"Beef Kebab",price:"₺450",desc:"Lavash, salad, grilled beef",img:"https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?auto=format&fit=crop&w=900&q=80"},
    {name:"Meatballs",price:"₺380",desc:"Köfte, fries, salad",img:"https://images.unsplash.com/photo-1529042410759-befb1204b468?auto=format&fit=crop&w=900&q=80"}
  ],
  Chicken:[
    {name:"Grilled Chicken",price:"₺320",desc:"Chicken breast, rice, salad",img:"https://images.unsplash.com/photo-1532550907401-a500c9a57435?auto=format&fit=crop&w=900&q=80"},
    {name:"Crispy Chicken",price:"₺340",desc:"Crispy strips, fries, sauce",img:"https://images.unsplash.com/photo-1562967914-608f82629710?auto=format&fit=crop&w=900&q=80"},
    {name:"Chicken Wings",price:"₺310",desc:"Spicy wings, ranch, fries",img:"https://images.unsplash.com/photo-1527477396000-e27163b481c2?auto=format&fit=crop&w=900&q=80"},
    {name:"Schnitzel",price:"₺350",desc:"Crispy schnitzel, lemon, fries",img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d?auto=format&fit=crop&w=900&q=80"},
    {name:"Chicken Wrap",price:"₺280",desc:"Tortilla, chicken, lettuce, sauce",img:"https://images.unsplash.com/photo-1626700051175-6818013e1d4f?auto=format&fit=crop&w=900&q=80"},
    {name:"Chicken Kebab",price:"₺360",desc:"Skewers, rice, salad",img:"https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?auto=format&fit=crop&w=900&q=80"}
  ],
  Sides:[
    {name:"French Fries",price:"₺120",desc:"Golden fries",img:"https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=900&q=80"},
    {name:"Curly Fries",price:"₺140",desc:"Seasoned curly fries",img:"https://images.unsplash.com/photo-1639024471283-03518883512d?auto=format&fit=crop&w=900&q=80"},
    {name:"Potato Wedges",price:"₺150",desc:"Spicy wedges",img:"https://images.unsplash.com/photo-1623238913973-21e45cced554?auto=format&fit=crop&w=900&q=80"},
    {name:"Garlic Bread",price:"₺130",desc:"Garlic butter bread",img:"https://images.unsplash.com/photo-1619535860434-cf9b6bfb8105?auto=format&fit=crop&w=900&q=80"},
    {name:"Rice",price:"₺90",desc:"Butter rice",img:"https://images.unsplash.com/photo-1536304993881-ff6e9eefa2a6?auto=format&fit=crop&w=900&q=80"},
    {name:"Coleslaw",price:"₺80",desc:"Creamy cabbage salad",img:"https://images.unsplash.com/photo-1625944525533-473f1a3d54e7?auto=format&fit=crop&w=900&q=80"}
  ],
  Drinks:[
    {name:"Coca-Cola",price:"₺70",desc:"Cold 330ml drink",img:"https://images.unsplash.com/photo-1622483767028-3f66f32aef97?auto=format&fit=crop&w=900&q=80"},
    {name:"Sprite",price:"₺70",desc:"Cold 330ml drink",img:"https://images.unsplash.com/photo-1581006852262-e4307cf6283a?auto=format&fit=crop&w=900&q=80"},
    {name:"Fanta",price:"₺70",desc:"Cold 330ml drink",img:"https://images.unsplash.com/photo-1624517452488-04869289c4ca?auto=format&fit=crop&w=900&q=80"},
    {name:"Ice Tea",price:"₺80",desc:"Peach or lemon",img:"https://images.unsplash.com/photo-1556679343-c7306c1976bc?auto=format&fit=crop&w=900&q=80"},
    {name:"Orange Juice",price:"₺120",desc:"Fresh orange juice",img:"https://images.unsplash.com/photo-1600271886742-f049cd451bba?auto=format&fit=crop&w=900&q=80"},
    {name:"Mineral Water",price:"₺40",desc:"Cold mineral water",img:"https://images.unsplash.com/photo-1548839140-29a749e1cf4d?auto=format&fit=crop&w=900&q=80"}
  ]
};

let activeCat = "Burgers";
let activeItem = menu[activeCat][0];

const orbit = document.getElementById("orbit");
const grid = document.getElementById("grid");
const select = document.getElementById("select");

Object.keys(menu).forEach((cat,i)=>{
  const p = document.createElement("button");
  p.className = "planet p" + (i+1) + (cat===activeCat ? " active" : "");
  p.innerHTML = `<img src="${categoryImages[cat]}" alt="${cat}" loading="lazy">`;
  p.onclick = () => setCategory(cat);
  orbit.appendChild(p);

  const opt = document.createElement("option");
  opt.value = cat;
  opt.textContent = cat;
  select.appendChild(opt);
});

select.onchange = () => setCategory(select.value);

function setCategory(cat){
  activeCat = cat;
  activeItem = menu[cat][0];
  select.value = cat;
  document.querySelectorAll(".planet").forEach((p,i)=>{
    p.classList.toggle("active", Object.keys(menu)[i] === cat);
  });
  renderSpotlight();
  renderGrid();
}

function renderSpotlight(){
  const spot = document.getElementById("spotlight");
  spot.classList.remove("pulse");
  void spot.offsetWidth;
  spot.classList.add("pulse");

  document.getElementById("spotImg").src = activeItem.img;
  document.getElementById("spotImg").alt = activeItem.name;
  document.getElementById("spotCat").textContent = activeCat;
  document.getElementById("spotName").textContent = activeItem.name;
  document.getElementById("spotDesc").textContent = activeItem.desc;
  document.getElementById("spotPrice").textContent = activeItem.price;
  document.getElementById("spotAdd").onclick = () => openDrawer(activeItem);
}

function renderGrid(){
  document.getElementById("listTitle").textContent = activeCat + " Menu";
  grid.innerHTML = "";
  menu[activeCat].forEach(item=>{
    const card = document.createElement("article");
    card.className = "item";
    card.innerHTML = `
      <div class="item-img"><img src="${item.img}" alt="${item.name}" loading="lazy"></div>
      <h3>${item.name}</h3>
      <p>${item.desc}</p>
      <div class="price">${item.price}</div>
    `;
    card.onclick = () => {
      activeItem = item;
      renderSpotlight();
      openDrawer(item);
      window.scrollTo({top:0,behavior:"smooth"});
    };
    grid.appendChild(card);
  });
}

function openDrawer(item){
  document.getElementById("drawerImg").src = item.img;
  document.getElementById("drawerImg").alt = item.name;
  document.getElementById("drawerName").textContent = item.name;
  document.getElementById("drawerPrice").textContent = item.price + " • Ready to order";
  document.getElementById("drawerOrder").href =
    "https://wa.me/905555555555?text=" + encodeURIComponent("Hello, I want to order " + item.name + " " + item.price);
  document.getElementById("drawer").classList.add("show");
}

setCategory(activeCat);
</script>
</body>
</html>
