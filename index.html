<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bilingual Menu Designs</title>

<style>
:root{
  --bg:#0f0d0a;
  --panel:#191510;
  --panel2:#241d15;
  --text:#fff7ed;
  --muted:#b9a997;
  --gold:#ffb545;
  --red:#ff4d2e;
  --green:#35d07f;
  --blue:#56a8ff;
  --purple:#b882ff;
  --radius:28px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  min-height:100vh;
  font-family:Inter,Arial,sans-serif;
  background:
    radial-gradient(circle at 20% -10%,rgba(255,181,69,.26),transparent 35%),
    radial-gradient(circle at 100% 20%,rgba(255,77,46,.18),transparent 32%),
    var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

body[dir="rtl"]{
  font-family:Tahoma,Arial,sans-serif;
  text-align:right;
}

button{
  font-family:inherit;
}

.screen{
  min-height:100vh;
  width:100%;
  display:none;
  align-items:center;
  justify-content:center;
  padding:22px;
}

.screen.active{
  display:flex;
}

.card{
  width:min(460px,100%);
  background:linear-gradient(145deg,rgba(255,255,255,.1),rgba(255,255,255,.035));
  border:1px solid rgba(255,255,255,.12);
  border-radius:34px;
  padding:28px;
  box-shadow:0 28px 90px rgba(0,0,0,.36);
  backdrop-filter:blur(18px);
}

.logo-big{
  width:74px;
  height:74px;
  display:grid;
  place-items:center;
  border-radius:24px;
  font-size:36px;
  margin:0 auto 18px;
  background:linear-gradient(145deg,var(--gold),var(--red));
  box-shadow:0 18px 45px rgba(255,115,40,.36);
}

.center{
  text-align:center;
}

h1{
  font-size:38px;
  line-height:1.02;
  letter-spacing:-1.4px;
  margin-bottom:10px;
}

body[dir="rtl"] h1,
body[dir="rtl"] .hero-title,
body[dir="rtl"] .design-card h2{
  letter-spacing:0;
}

p{
  color:var(--muted);
  line-height:1.55;
}

.lang-buttons{
  display:grid;
  gap:14px;
  margin-top:26px;
}

.big-btn{
  border:0;
  border-radius:22px;
  padding:18px 20px;
  font-size:18px;
  font-weight:1000;
  color:#1b1008;
  background:linear-gradient(135deg,var(--gold),#ffe0a2);
  cursor:pointer;
  transition:.25s ease;
}

.big-btn.secondary{
  background:#fff7ed;
  color:#17100b;
}

.big-btn:hover{
  transform:translateY(-3px);
}

.loader{
  width:74px;
  height:74px;
  border-radius:50%;
  border:6px solid rgba(255,255,255,.13);
  border-top-color:var(--gold);
  animation:spin 1s linear infinite;
  margin:0 auto 20px;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

#designScreen{
  align-items:flex-start;
  padding-top:26px;
  padding-bottom:34px;
}

.container{
  width:min(1120px,100%);
  margin:auto;
}

.topline{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  margin-bottom:24px;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:1000;
  font-size:19px;
}

.brand-icon{
  width:44px;
  height:44px;
  border-radius:16px;
  background:linear-gradient(145deg,var(--gold),var(--red));
  display:grid;
  place-items:center;
}

.switch-btn{
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.08);
  color:var(--text);
  padding:12px 16px;
  border-radius:999px;
  font-weight:900;
  cursor:pointer;
  transition:.25s ease;
}

.switch-btn:hover{
  background:rgba(255,255,255,.14);
}

.hero-title{
  font-size:clamp(36px,8vw,82px);
  line-height:.93;
  letter-spacing:-3px;
  max-width:820px;
  margin-bottom:14px;
}

.hero-sub{
  max-width:620px;
  font-size:17px;
  margin-bottom:24px;
}

.design-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-top:24px;
}

.design-card{
  min-height:250px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:30px;
  padding:20px;
  background:linear-gradient(145deg,var(--panel),var(--panel2));
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:.32s cubic-bezier(.2,.8,.2,1);
}

.design-card:hover{
  transform:translateY(-8px);
  border-color:rgba(255,181,69,.45);
}

.design-card:before{
  content:"";
  position:absolute;
  width:160px;
  height:160px;
  border-radius:50%;
  right:-55px;
  top:-45px;
  background:var(--glow);
  filter:blur(3px);
  opacity:.28;
}

body[dir="rtl"] .design-card:before{
  right:auto;
  left:-55px;
}

.number{
  font-size:64px;
  font-weight:1000;
  color:rgba(255,255,255,.12);
  line-height:1;
  margin-bottom:28px;
}

.design-card h2{
  font-size:24px;
  letter-spacing:-.8px;
  margin-bottom:8px;
  position:relative;
  z-index:2;
}

.design-card p{
  font-size:14px;
  position:relative;
  z-index:2;
}

.tag{
  position:absolute;
  bottom:18px;
  left:18px;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.1);
  border-radius:999px;
  padding:9px 12px;
  font-size:12px;
  font-weight:900;
  color:var(--text);
}

body[dir="rtl"] .tag{
  left:auto;
  right:18px;
}

@media(max-width:850px){
  .design-grid{
    grid-template-columns:1fr 1fr;
  }
}

@media(max-width:560px){
  .topline{
    align-items:flex-start;
    flex-direction:column;
  }

  .design-grid{
    grid-template-columns:1fr;
  }

  .design-card{
    min-height:210px;
  }

  .hero-title{
    letter-spacing:-1.8px;
  }

  .screen{
    padding:16px;
  }

  .card{
    padding:22px;
    border-radius:28px;
  }
}
</style>
</head>

<body>

<section id="langScreen" class="screen active">
  <div class="card center">
    <div class="logo-big">🍽️</div>
    <h1>Choose your language</h1>
    <p>اختر اللغة التي تريد رؤية تصاميم القائمة بها</p>

    <div class="lang-buttons">
      <button class="big-btn" onclick="chooseLanguage('ar')">🇸🇦 العربية</button>
      <button class="big-btn secondary" onclick="chooseLanguage('en')">🇬🇧 English</button>
    </div>
  </div>
</section>

<section id="loadingScreen" class="screen">
  <div class="card center">
    <div class="loader"></div>
    <h1 id="loadingTitle">Loading...</h1>
    <p id="loadingText">Preparing your restaurant menus</p>
  </div>
</section>

<section id="designScreen" class="screen">
  <div class="container">
    <div class="topline">
      <div class="brand">
        <div class="brand-icon">🍽️</div>
        <span id="brandText">Menu Designs</span>
      </div>

      <button class="switch-btn" onclick="resetLanguage()" id="changeLangBtn">
        Change Language
      </button>
    </div>

    <h1 class="hero-title" id="designTitle">
      Choose one of 4 restaurant menu designs
    </h1>

    <p class="hero-sub" id="designSub">
      Select a design number to explore a unique restaurant menu experience.
    </p>

    <div class="design-grid" id="designGrid"></div>
  </div>
</section>

<script>
let currentLang = 'en';

const pageLinks = {
  en: ['a.html', 'b.html', 'c.html', 'd.html'],
  ar: ['1.html', '2.html', '3.html', '4.html']
};

const text = {
  en:{
    loadingTitle:'Loading...',
    loadingText:'Preparing your restaurant menus',

    brand:'Menu Designs',
    change:'Change Language',

    title:'Choose one of 4 restaurant menu designs',
    sub:'Select a design number to explore a unique restaurant menu experience.',

    open:'Open Design',

    designs:[
      {
        name:'3D Orbit Menu',
        desc:'Interactive orbit-style menu with rotating food categories, spotlight products and WhatsApp ordering.'
      },
      {
        name:'Luxury Editorial Menu',
        desc:'Elegant restaurant menu with premium cards, large food showcases and luxury styling.'
      },
      {
        name:'Premium 3D Showcase',
        desc:'Animated 3D food presentation with floating product cards and immersive product switching.'
      },
      {
        name:'Modern Mobile Menu',
        desc:'Mobile-first menu design optimized for restaurants, cafés and delivery businesses.'
      }
    ]
  },

  ar:{
    loadingTitle:'جاري التحميل...',
    loadingText:'يتم تجهيز قوائم المطاعم',

    brand:'تصاميم القوائم',
    change:'تغيير اللغة',

    title:'اختر واحداً من 4 تصاميم لقوائم المطاعم',
    sub:'اختر رقم التصميم لاستعراض تجربة مختلفة وفريدة لقائمة المطعم.',

    open:'فتح التصميم',

    designs:[
      {
        name:'قائمة المدار ثلاثية الأبعاد',
        desc:'قائمة تفاعلية تعتمد على دوران الأقسام مع عرض مميز للمنتجات وإمكانية الطلب عبر واتساب.'
      },
      {
        name:'القائمة الفاخرة الكلاسيكية',
        desc:'تصميم أنيق وفخم مع بطاقات احترافية وعرض كبير للأطباق بأسلوب راقٍ.'
      },
      {
        name:'عرض المنتجات ثلاثي الأبعاد',
        desc:'تصميم متحرك يعرض الوجبات بأسلوب ثلاثي الأبعاد مع تأثيرات احترافية وتبديل سلس للمنتجات.'
      },
      {
        name:'القائمة الحديثة للجوال',
        desc:'تصميم سريع ومتجاوب مخصص للهواتف والمطاعم والمقاهي وخدمات التوصيل.'
      }
    ]
  }
};

const styles = [
  {glow:'rgba(255,181,69,.8)'},
  {glow:'rgba(255,247,237,.75)'},
  {glow:'rgba(86,168,255,.85)'},
  {glow:'rgba(53,208,127,.85)'}
];

function chooseLanguage(lang){
  currentLang = lang;
  localStorage.setItem('selectedMenuLang', lang);

  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.body.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');

  document.getElementById('langScreen').classList.remove('active');
  document.getElementById('loadingScreen').classList.add('active');

  document.getElementById('loadingTitle').textContent = text[lang].loadingTitle;
  document.getElementById('loadingText').textContent = text[lang].loadingText;

  setTimeout(()=>{
    document.getElementById('loadingScreen').classList.remove('active');
    document.getElementById('designScreen').classList.add('active');
    renderDesigns();
  },900);
}

function renderDesigns(){
  const t = text[currentLang];

  document.getElementById('brandText').textContent = t.brand;
  document.getElementById('changeLangBtn').textContent = t.change;
  document.getElementById('designTitle').textContent = t.title;
  document.getElementById('designSub').textContent = t.sub;

  const grid = document.getElementById('designGrid');
  grid.innerHTML = '';

  t.designs.forEach((d,i)=>{
    const card = document.createElement('article');
    card.className = 'design-card';
    card.style.setProperty('--glow', styles[i].glow);
    card.onclick = ()=>openMenu(i);

    card.innerHTML = `
      <div class="number">${i+1}</div>
      <h2>${d.name}</h2>
      <p>${d.desc}</p>
      <div class="tag">${t.open}</div>
    `;

    grid.appendChild(card);
  });
}

function openMenu(index){
  const pages = pageLinks[currentLang] || pageLinks.en;
  window.location.href = pages[index];
}

function resetLanguage(){
  localStorage.removeItem('selectedMenuLang');

  document.getElementById('designScreen').classList.remove('active');
  document.getElementById('loadingScreen').classList.remove('active');
  document.getElementById('langScreen').classList.add('active');

  document.body.removeAttribute('dir');
  document.documentElement.lang = 'en';
  document.documentElement.dir = 'ltr';
}
</script>

</body>
</html>
